name: CI

# Gate every PR (and main pushes) on the full check suite AND the Playwright
# e2e suite. The deploy workflow runs the non-e2e gate on push-to-main only, so
# without this, e2e drift (and any PR-time regression) went uncaught.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint (ESLint + stylelint)
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Typecheck
        run: npm run typecheck
      - name: Dependency layer check
        run: npm run depcheck
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Build (preview server serves dist)
        run: npm run build
      - name: Playwright e2e
        run: npm run e2e
